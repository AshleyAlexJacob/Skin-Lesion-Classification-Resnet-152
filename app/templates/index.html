<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Diagnostics Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dashboard: {
                            bg: '#1a1b1e',
                            card: '#24252b',
                            cardHover: '#2a2b32',
                            accent: '#06b6d4',  // Cyan/Teal (Clinical Cool)
                            accentDark: '#0891b2',
                            textPrimary: '#f8fafc',
                            textSecondary: '#94a3b8',
                            green: '#10b981',
                            border: '#33343b'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'laser': 'laserScan 2.5s ease-in-out infinite',
                        'ekg': 'ekgDraw 3s linear infinite',
                        'glowPulse': 'glowPulse 4s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        laserScan: {
                            '0%, 100%': { transform: 'translateY(-100%)', opacity: '0' },
                            '10%, 90%': { opacity: '1' },
                            '50%': { transform: 'translateY(100%)' }
                        },
                        ekgDraw: {
                            '0%': { strokeDashoffset: '1000' },
                            '100%': { strokeDashoffset: '0' }
                        },
                        glowPulse: {
                            '0%': { opacity: '0.3', transform: 'scale(0.95) translateX(-50%)' },
                            '100%': { opacity: '0.6', transform: 'scale(1.05) translateX(-50%)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            background-color: #1a1b1e;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Scrollbars */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1b1e;
        }

        ::-webkit-scrollbar-thumb {
            background: #33343b;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4b5563;
        }

        .glass-hero {
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.4);
            position: relative;
            overflow: hidden;
        }

        .glass-hero::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 1440 320" xmlns="http://www.w3.org/2000/svg"><path fill="rgba(255,255,255,0.1)" d="M0,160L48,154.7C96,149,192,139,288,149.3C384,160,480,192,576,202.7C672,213,768,203,864,176C960,149,1056,107,1152,101.3C1248,96,1344,128,1392,144L1440,160L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') no-repeat bottom center;
            background-size: cover;
            opacity: 0.6;
            pointer-events: none;
        }

        /* Staggered animation classes */
        .stagger-1 {
            animation: slideUpFade 0.5s ease-out 0.1s both;
        }

        .stagger-2 {
            animation: slideUpFade 0.5s ease-out 0.2s both;
        }

        .stagger-3 {
            animation: slideUpFade 0.5s ease-out 0.3s both;
        }

        .stagger-4 {
            animation: slideUpFade 0.5s ease-out 0.4s both;
        }

        @keyframes slideUpFade {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Skeleton Pulse */
        .skeleton {
            background: linear-gradient(90deg, #2a2b32 25%, #33343b 50%, #2a2b32 75%);
            background-size: 200% 100%;
            animation: skeletonLoading 1.5s infinite;
        }

        @keyframes skeletonLoading {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* Grid background pattern */
        .grid-pattern {
            background-image:
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const CLASS_META = {
            'mel': { name: 'Melanoma', severity: 'High', color: 'text-red-400', statColor: 'bg-red-400', desc: 'A dangerous type of skin cancer that can spread rapidly. Immediate clinical consultation required.' },
            'nv': { name: 'Melanocytic Nevus', severity: 'Low', color: 'text-dashboard-green', statColor: 'bg-dashboard-green', desc: 'A common, harmless mole. Usually no treatment is necessary.' },
            'bcc': { name: 'Basal Cell Carcinoma', severity: 'Medium', color: 'text-amber-400', statColor: 'bg-amber-400', desc: 'A common, slow-growing skin cancer. Rarely spreads, but should be treated.' },
            'akiec': { name: 'Actinic Keratosis', severity: 'Medium', color: 'text-amber-400', statColor: 'bg-amber-400', desc: 'A precancerous scaly patch caused by sun damage. Can progress to cancer.' },
            'bkl': { name: 'Benign Keratosis', severity: 'Low', color: 'text-dashboard-green', statColor: 'bg-dashboard-green', desc: 'A harmless, non-cancerous skin growth prevalent with aging.' },
            'df': { name: 'Dermatofibroma', severity: 'Low', color: 'text-dashboard-green', statColor: 'bg-dashboard-green', desc: 'A common benign fibrous nodule often found on lower legs.' },
            'vasc': { name: 'Vascular Lesion', severity: 'Low', color: 'text-dashboard-green', statColor: 'bg-dashboard-green', desc: 'A harmless overgrowth of blood vessels (e.g., hemangioma).' },
        };

        const STATUS = {
            IDLE: 'IDLE',
            ANALYZING: 'ANALYZING',
            SUCCESS: 'SUCCESS',
            ERROR: 'ERROR'
        };

        function CircularProgress({ percent, bg, className }) {
            const radius = 45;
            const circumference = 2 * Math.PI * radius;
            const dashArray = `${circumference * 0.5} ${circumference * 0.5}`;
            const finalOffset = circumference * 0.5 - (percent / 100) * (circumference * 0.5);

            return (
                <div className={`relative ${className}`}>
                    <svg width="100%" height="100%" viewBox="0 0 100 100" style={{ transform: 'rotate(180deg)' }}>
                        <path d="M 10,50 a 40,40 0 1,1 80,0" fill="none" stroke="#33343b" strokeWidth="10" strokeLinecap="round" />
                        <path
                            d="M 10,50 a 40,40 0 1,1 80,0"
                            fill="none" stroke={bg || "#06b6d4"} strokeWidth="10" strokeLinecap="round"
                            strokeDasharray={`${circumference} ${circumference}`}
                            strokeDashoffset={finalOffset}
                            style={{ transition: 'stroke-dashoffset 1.5s cubic-bezier(0.22, 1, 0.36, 1)' }}
                        />
                    </svg>
                </div>
            );
        }

        // Animated EKG Wave SVG Component for empty states
        function EKGSpline() {
            return (
                <svg className="w-full h-16 opacity-20" viewBox="0 0 500 100" preserveAspectRatio="none">
                    <polyline
                        fill="none"
                        stroke="#06b6d4"
                        strokeWidth="3"
                        strokeLinecap="round"
                        strokeLinejoin="round"
                        strokeDasharray="1000"
                        className="animate-ekg"
                        points="0,50 50,50 70,20 90,80 110,10 130,90 150,50 500,50"
                    />
                </svg>
            );
        }

        function App() {
            const [file, setFile] = React.useState(null);
            const [previewUrl, setPreviewUrl] = React.useState(null);
            const [status, setStatus] = React.useState(STATUS.IDLE);
            const [errorMsg, setErrorMsg] = React.useState('');
            const [result, setResult] = React.useState(null);
            const [currentTime, setCurrentTime] = React.useState(new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));

            React.useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })), 60000);
                return () => clearInterval(timer);
            }, []);

            const handleFileChange = (e) => {
                const selectedFile = e.target.files[0];
                if (selectedFile) processSelection(selectedFile);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                    processSelection(e.dataTransfer.files[0]);
                }
            };

            const processSelection = (selectedFile) => {
                if (selectedFile.type.startsWith('image/')) {
                    setFile(selectedFile);
                    setPreviewUrl(URL.createObjectURL(selectedFile));
                    setStatus(STATUS.IDLE);
                    setResult(null);
                    setErrorMsg('');
                } else {
                    setErrorMsg('Invalid format. Please use JPEG or PNG.');
                }
            };

            const analyzeImage = async () => {
                if (!file) return;

                setStatus(STATUS.ANALYZING);
                setErrorMsg('');

                const formData = new FormData();
                formData.append('file', file);

                try {
                    // Start analysis timeline
                    const analyzeStart = Date.now();
                    const response = await fetch('/predict', { method: 'POST', body: formData });

                    if (!response.ok) throw new Error(`API Error: ${response.status}`);
                    const data = await response.json();

                    // Enforce minimum 1.5s delay to let the user see the gorgeous scanning animation
                    const timeElapsed = Date.now() - analyzeStart;
                    if (timeElapsed < 1500) await new Promise(r => setTimeout(r, 1500 - timeElapsed));

                    setResult(data);
                    setStatus(STATUS.SUCCESS);
                } catch (err) {
                    console.error('API Error:', err);
                    setErrorMsg('Network error or invalid image.');
                    setStatus(STATUS.ERROR);
                }
            };

            const resetDashboard = () => {
                setFile(null);
                setPreviewUrl(null);
                setStatus(STATUS.IDLE);
                setResult(null);
                setErrorMsg('');
            };

            const confidencePercent = result ? Math.round(result.confidence * 100) : 0;
            const diagnosis = result ? CLASS_META[result.prediction] : null;

            return (
                <div className="min-h-screen bg-dashboard-bg p-4 sm:p-6 lg:p-8 flex items-center justify-center relative overflow-hidden">

                    {/* Smoky Blue Atmospheric Glow */}
                    <div className="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-blue-600/15 blur-[120px] pointer-events-none"></div>
                    <div className="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-sky-600/10 blur-[120px] pointer-events-none"></div>

                    <div className="max-w-7xl w-full mx-auto flex flex-col gap-6 relative z-10">

                        {/* Header */}
                        <header className="flex items-center justify-between w-full">
                            <div className="flex-1 max-w-md bg-dashboard-card rounded-full px-5 py-3 flex items-center text-dashboard-textSecondary border border-dashboard-border shadow-sm group hover:border-dashboard-accent/50 transition-colors">
                                <i className="ph ph-magnifying-glass text-lg mr-3 group-hover:text-dashboard-accent transition-colors"></i>
                                <span className="text-sm">Search patient IDs or records...</span>
                            </div>

                            <div className="flex items-center gap-4">
                                <div className="hidden sm:flex bg-dashboard-card rounded-full p-1.5 border border-dashboard-border">
                                    <button className="h-10 w-10 rounded-full flex items-center justify-center text-dashboard-textSecondary hover:text-white transition-colors">
                                        <i className="ph ph-bell text-xl"></i>
                                    </button>
                                    <button className="h-10 w-10 rounded-full flex items-center justify-center bg-dashboard-accent text-white shadow-[0_0_15px_rgba(6,182,212,0.5)]">
                                        <i className="ph ph-squares-four text-xl"></i>
                                    </button>
                                    <button className="h-10 w-10 rounded-full flex items-center justify-center text-dashboard-textSecondary hover:text-white transition-colors">
                                        <i className="ph ph-gear text-xl"></i>
                                    </button>
                                </div>
                                <div className="h-11 w-11 rounded-full bg-slate-700 overflow-hidden border-2 border-dashboard-border shadow-sm cursor-pointer hover:border-dashboard-accent transition-colors">
                                    <img src="https://api.dicebear.com/9.x/notionists/svg?seed=Felix&backgroundColor=24252b" alt="User" className="h-full w-full object-cover" />
                                </div>
                            </div>
                        </header>

                        {/* Bento Grid */}
                        <main className="grid grid-cols-1 md:grid-cols-12 gap-6 auto-rows-min">

                            {/* COLL 1: Hero Action Card */}
                            <div className="md:col-span-12 lg:col-span-4 flex flex-col gap-6">
                                <div className="glass-hero rounded-[32px] p-8 flex flex-col min-h-[500px] text-white">
                                    <div className="z-10 relative flex-1 flex flex-col">
                                        <h3 className="text-white/80 font-medium mb-1">Hello Dr. Smith</h3>
                                        <h1 className="text-4xl font-semibold mb-8 tracking-tight text-balance">
                                            What are you diagnosing today?
                                        </h1>

                                        {!previewUrl ? (
                                            <div
                                                className="flex-1 bg-black/10 backdrop-blur-md border border-white/20 rounded-2xl flex flex-col items-center justify-center text-center p-6 cursor-pointer hover:bg-black/20 hover:border-white/40 transition-all border-dashed group"
                                                onDragOver={(e) => e.preventDefault()}
                                                onDrop={handleDrop}
                                                onClick={() => document.getElementById('file-upload').click()}
                                            >
                                                <i className="ph ph-scan text-4xl mb-3 opacity-90 group-hover:scale-110 transition-transform"></i>
                                                <p className="font-medium">Upload Lesion Scan</p>
                                                <p className="text-white/60 text-sm mt-1">Drag & Drop Image</p>
                                                <input id="file-upload" type="file" accept="image/*" className="hidden" onChange={handleFileChange} />
                                            </div>
                                        ) : (
                                            <div className="flex-1 flex flex-col gap-4">
                                                {/* Image Preview with Hover Pan/Zoom and Laser line */}
                                                <div className="w-full h-56 bg-black/30 backdrop-blur-md border border-white/20 rounded-2xl overflow-hidden relative shadow-inner group">
                                                    <img
                                                        src={previewUrl}
                                                        className={`w-full h-full object-cover transition-transform duration-700 ease-out group-hover:scale-110 ${status === STATUS.ANALYZING ? 'opacity-50 grayscale scale-105' : ''}`}
                                                    />

                                                    {/* Animated Laser Sweep */}
                                                    {status === STATUS.ANALYZING && (
                                                        <div className="absolute inset-0 z-10 overflow-hidden pointer-events-none">
                                                            <div className="w-full h-0.5 shadow-[0_0_15px_3px_#10b981] bg-dashboard-green animate-laser"></div>
                                                            <div className="absolute inset-0 bg-dashboard-green/10 animate-pulse"></div>
                                                        </div>
                                                    )}
                                                </div>

                                                {status === STATUS.IDLE && (
                                                    <button onClick={analyzeImage} className="w-full bg-white text-dashboard-accent font-semibold py-4 rounded-xl flex items-center justify-center shadow-lg hover:shadow-[0_0_20px_rgba(255,255,255,0.4)] hover:scale-[1.02] transition-all">
                                                        <i className="ph-fill ph-stethoscope mr-2 text-xl"></i>
                                                        Execute ResNet Analysis
                                                    </button>
                                                )}

                                                {status === STATUS.ANALYZING && (
                                                    <div className="w-full bg-white/10 backdrop-blur-md text-white font-medium py-4 rounded-xl flex items-center justify-center border border-white/20 shadow-[inset_0_0_20px_rgba(255,255,255,0.1)]">
                                                        <i className="ph ph-spinner-gap animate-spin mr-3 text-2xl"></i>
                                                        Processing Tensor...
                                                    </div>
                                                )}

                                                {status === STATUS.SUCCESS && (
                                                    <button onClick={resetDashboard} className="w-full bg-black/30 backdrop-blur-md text-white font-medium py-3 rounded-xl flex items-center justify-center border border-white/30 hover:bg-black/50 transition-colors">
                                                        <i className="ph ph-arrow-counter-clockwise mr-2 text-xl"></i>
                                                        New Scan
                                                    </button>
                                                )}

                                                {status === STATUS.ERROR && (
                                                    <div className="w-full bg-red-900/50 backdrop-blur-md text-white font-medium py-3 rounded-xl flex flex-col items-center justify-center border border-red-500/50">
                                                        <span className="flex items-center"><i className="ph ph-warning-circle mr-2 text-xl"></i> Error Occurred</span>
                                                        <span className="text-xs mt-1 opacity-80">{errorMsg}</span>
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        <div className="bg-white/95 text-dashboard-bg rounded-2xl p-4 flex justify-between items-center mt-auto shadow-xl z-20 backdrop-blur-md mt-6">
                                            <button className="h-10 w-10 flex items-center justify-center hover:bg-dashboard-accent hover:text-white rounded-xl transition-colors"><i className="ph ph-folder-open text-xl"></i></button>
                                            <button className="h-10 w-10 flex items-center justify-center hover:bg-dashboard-accent hover:text-white rounded-xl transition-colors"><i className="ph ph-camera text-xl"></i></button>
                                            <button className="h-10 w-10 flex items-center justify-center hover:bg-dashboard-accent hover:text-white rounded-xl transition-colors"><i className="ph ph-microphone text-xl"></i></button>
                                            <button className="h-10 w-10 flex items-center justify-center hover:bg-dashboard-accent hover:text-white rounded-xl transition-colors"><i className="ph ph-calendar text-xl"></i></button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* COLL 2: Core Metrics */}
                            <div className="md:col-span-6 lg:col-span-4 flex flex-col gap-6">

                                {/* Status Widget */}
                                <div className="bg-dashboard-card rounded-[28px] p-6 border border-dashboard-border shadow-md transition-all duration-300 hover:-translate-y-2 hover:shadow-[0_15px_30px_-10px_rgba(6,182,212,0.3)] hover:border-dashboard-accent/30 group">
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="text-lg font-medium transition-colors group-hover:text-dashboard-accent">Session Status</h3>
                                        <i className="ph ph-activity text-dashboard-textSecondary text-xl"></i>
                                    </div>
                                    <div className="flex justify-between items-center px-2">
                                        <div className="flex flex-col items-center">
                                            <div className="relative mb-2">
                                                <div className="w-12 h-12 rounded-full border-2 border-dashboard-border flex items-center justify-center bg-dashboard-bg">
                                                    <i className="ph-fill ph-cpu text-dashboard-textSecondary text-xl"></i>
                                                </div>
                                                <div className="absolute top-0 right-0 w-3 h-3 bg-dashboard-accent rounded-full border-2 border-dashboard-card shadow-[0_0_8px_#06b6d4]"></div>
                                            </div>
                                            <p className="text-xs text-dashboard-textSecondary font-medium">Model</p>
                                        </div>

                                        <div className="flex-1 border-t-2 border-dashed border-dashboard-border mx-4 mt-[-20px] relative">
                                            {status === STATUS.ANALYZING && <div className="absolute top-[-5px] left-0 h-2 w-2 rounded-full bg-dashboard-accent animate-[ping_1s_infinite] shadow-[0_0_10px_#06b6d4]"></div>}
                                            {status === STATUS.SUCCESS && <div className="absolute top-[-5px] right-0 h-2 w-2 rounded-full bg-dashboard-green shadow-[0_0_10px_#10b981]"></div>}
                                        </div>

                                        <div className="flex flex-col items-center">
                                            <div className="relative mb-2">
                                                <div className={`w-12 h-12 rounded-full border-2 transition-colors duration-700 flex items-center justify-center ${status === STATUS.SUCCESS ? 'bg-dashboard-green/10 border-dashboard-green/50 shadow-[0_0_15px_rgba(16,185,129,0.3)]' : 'bg-dashboard-bg border-dashboard-border'}`}>
                                                    <i className={`ph-fill ph-check-circle text-xl transition-colors duration-700 ${status === STATUS.SUCCESS ? 'text-dashboard-green' : 'text-dashboard-textSecondary'}`}></i>
                                                </div>
                                            </div>
                                            <p className="text-xs text-dashboard-textSecondary font-medium">Result</p>
                                        </div>
                                    </div>

                                    <div className="mt-8 flex justify-between px-2 text-sm">
                                        <div>
                                            <p className="font-semibold text-dashboard-textPrimary">{currentTime}</p>
                                            <p className="text-xs text-dashboard-textSecondary mt-0.5">Last Sync</p>
                                        </div>
                                        <div>
                                            <p className="font-semibold tracking-wider text-dashboard-textPrimary">RN-152</p>
                                            <p className="text-xs text-dashboard-textSecondary mt-0.5 text-right">Architecture</p>
                                        </div>
                                    </div>
                                </div>

                                {/* Confidence Gauge Widget */}
                                <div className="bg-dashboard-card rounded-[28px] p-6 border border-dashboard-border shadow-md transition-all duration-300 hover:-translate-y-2 hover:shadow-[0_15px_30px_-10px_rgba(6,182,212,0.3)] hover:border-dashboard-accent/50 group flex-1 flex flex-col relative overflow-hidden">
                                    {/* Animated Holographic Glow Behind Text */}
                                    <div className={`absolute bottom-[-50px] left-1/2 -translate-x-1/2 w-72 h-48 rounded-full blur-[60px] pointer-events-none transition-all duration-1000 ${status === STATUS.SUCCESS ? 'bg-dashboard-accent/30 animate-glowPulse' : 'bg-blue-500/5'}`}></div>

                                    <h3 className="text-lg font-medium mb-8 transition-colors group-hover:text-dashboard-accent relative z-10">Certainty Score</h3>

                                    <div className="relative flex-1 flex flex-col items-center justify-end pb-4 pt-10">
                                        <CircularProgress percent={confidencePercent} className="w-56 h-28 absolute bottom-4 z-10" />

                                        <div className="text-center z-20 relative mt-4">
                                            <i className="ph-fill ph-target text-3xl mb-1 text-dashboard-textPrimary"></i>
                                            <h2 className="text-5xl font-bold tracking-tight mb-1 text-white">
                                                {status === STATUS.SUCCESS ? confidencePercent : '- -'}
                                                <span className="text-2xl text-dashboard-textSecondary font-normal">/100</span>
                                            </h2>
                                            <p className="text-sm text-dashboard-textSecondary">
                                                {status === STATUS.ANALYZING ? 'Calculating...' : 'Model Confidence'}
                                            </p>
                                        </div>
                                    </div>
                                </div>

                            </div>

                            {/* COLL 3: Detailed Report & Diagnosis */}
                            <div className="md:col-span-6 lg:col-span-4 flex flex-col gap-6 relative">

                                {/* Diagnostic Body Card */}
                                <div className="bg-dashboard-card rounded-[28px] p-6 border border-dashboard-border shadow-md transition-all duration-300 hover:-translate-y-2 hover:shadow-[0_15px_30px_-10px_rgba(6,182,212,0.3)] hover:border-dashboard-accent/50 group relative overflow-hidden">
                                    <div className="relative z-10">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="text-lg font-medium transition-colors group-hover:text-dashboard-accent">Diagnostic Report</h3>
                                            <button className="p-1.5 bg-dashboard-bg rounded-lg text-dashboard-textSecondary hover:text-white border border-dashboard-border transition-colors hover:border-dashboard-accent">
                                                <i className="ph ph-export text-lg"></i>
                                            </button>
                                        </div>

                                        {status === STATUS.SUCCESS && diagnosis ? (
                                            <div className="space-y-4">
                                                <div className="bg-dashboard-bg border border-dashboard-border rounded-2xl p-4 flex items-center justify-between shadow-inner stagger-1">
                                                    <div className="flex items-center gap-3">
                                                        <div className={`w-10 h-10 rounded-xl ${diagnosis.statColor} bg-opacity-20 flex items-center justify-center shadow-inner`}>
                                                            <i className={`ph-fill ph-dna ${diagnosis.color} text-xl`}></i>
                                                        </div>
                                                        <div>
                                                            <p className="text-xs text-dashboard-textSecondary mb-0.5 uppercase tracking-wider font-semibold">Primary Output</p>
                                                            <p className="font-semibold text-white">{diagnosis.name}</p>
                                                        </div>
                                                    </div>
                                                    <span className={`text-sm font-bold bg-dashboard-card px-3 py-1 rounded-full border border-dashboard-border ${diagnosis.color}`}>{confidencePercent}%</span>
                                                </div>

                                                <div className="flex justify-between items-center px-4 py-3 border border-dashboard-border bg-dashboard-bg/50 rounded-xl stagger-2">
                                                    <div className="flex items-center gap-2 text-sm text-dashboard-textSecondary">
                                                        <i className="ph ph-warning-octagon text-lg"></i>
                                                        <span>Risk Severity</span>
                                                    </div>
                                                    <span className={`font-semibold text-sm ${diagnosis.color}`}>{diagnosis.severity}</span>
                                                </div>

                                                <div className="flex justify-between items-center px-4 py-3 border border-dashboard-border bg-dashboard-bg/50 rounded-xl stagger-3">
                                                    <div className="flex items-center gap-2 text-sm text-dashboard-textSecondary">
                                                        <i className="ph ph-hash text-lg"></i>
                                                        <span>Label Code</span>
                                                    </div>
                                                    <span className="font-medium text-sm px-2 py-1 bg-[#1a1b1e] border border-dashboard-border rounded-md text-white shadow-sm uppercase">
                                                        {result.prediction}
                                                    </span>
                                                </div>
                                            </div>
                                        ) : status === STATUS.ANALYZING ? (
                                            <div className="space-y-4">
                                                <div className="skeleton h-16 w-full rounded-2xl"></div>
                                                <div className="skeleton h-12 w-full rounded-xl"></div>
                                                <div className="skeleton h-12 w-full rounded-xl"></div>
                                            </div>
                                        ) : (
                                            /* Empty state with data stream visual */
                                            <div className="h-44 border-2 border-dashed border-dashboard-border rounded-xl flex items-center justify-center text-dashboard-textSecondary text-sm relative overflow-hidden group-hover:border-dashboard-accent/30 transition-colors">
                                                <div className="absolute inset-0 grid-pattern opacity-50"></div>
                                                <div className="relative z-10 flex flex-col items-center">
                                                    <EKGSpline />
                                                    <p className="mt-2 text-xs uppercase tracking-widest opacity-60">Awaiting Signal</p>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Clinical Context Card */}
                                <div className="bg-dashboard-card rounded-[28px] p-6 border border-dashboard-border shadow-md transition-all duration-300 hover:-translate-y-2 hover:shadow-[0_15px_30px_-10px_rgba(6,182,212,0.3)] hover:border-dashboard-accent/50 group flex-1 flex flex-col overflow-hidden relative">
                                    <h3 className="text-lg font-medium mb-6 transition-colors group-hover:text-dashboard-accent relative z-10">Clinical Intelligence</h3>

                                    {/* Data grid background showing when in success mode */}
                                    {status === STATUS.SUCCESS && <div className="absolute inset-0 grid-pattern opacity-20 pointer-events-none"></div>}

                                    <div className="flex-1 flex flex-col justify-center gap-6 relative z-10">
                                        {status === STATUS.SUCCESS && diagnosis ? (
                                            <div className="stagger-4">
                                                <h4 className="text-3xl font-bold tracking-tight mb-3 text-white text-balance">
                                                    {diagnosis.name}
                                                </h4>
                                                <p className="text-dashboard-textSecondary text-sm leading-relaxed mb-6 font-medium">
                                                    {diagnosis.desc}
                                                </p>

                                                <button className={`w-full border font-medium py-3.5 rounded-xl transition-all flex items-center justify-center text-sm shadow-sm ${diagnosis.severity === 'High' ? 'bg-dashboard-accent/10 border-dashboard-accent text-dashboard-accent hover:bg-dashboard-accent hover:text-white' : 'bg-dashboard-bg border-dashboard-border text-white hover:border-dashboard-green hover:text-dashboard-green'}`}>
                                                    {diagnosis.severity === 'High' ? (
                                                        <><i className="ph-fill ph-warning mr-2 text-lg"></i> Priority Medical Review</>
                                                    ) : (
                                                        <><i className="ph ph-floppy-disk mr-2 text-lg"></i> Save Record</>
                                                    )}
                                                </button>
                                            </div>
                                        ) : status === STATUS.ANALYZING ? (
                                            <div className="space-y-3">
                                                <div className="skeleton h-8 w-3/4 rounded-lg"></div>
                                                <div className="skeleton h-4 w-full rounded-md mt-4"></div>
                                                <div className="skeleton h-4 w-5/6 rounded-md"></div>
                                                <div className="skeleton h-12 w-full rounded-xl mt-6"></div>
                                            </div>
                                        ) : (
                                            <div className="text-center">
                                                <div className="w-16 h-16 rounded-2xl bg-dashboard-bg border border-dashboard-border flex items-center justify-center mx-auto mb-4 scale-100 group-hover:scale-110 transition-transform">
                                                    <i className="ph ph-books text-2xl text-dashboard-textSecondary"></i>
                                                </div>
                                                <p className="text-dashboard-textSecondary text-sm text-balance max-w-xs mx-auto">
                                                    Clinical definitions and recommended next steps will appear here.
                                                </p>
                                            </div>
                                        )}
                                    </div>
                                </div>

                            </div>
                        </main>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
