<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Skin Lesion Diagnostics</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dashboard: {
                            bg: '#1a1b1e',
                            card: '#24252b',
                            cardHover: '#2a2b32',
                            accent: '#06b6d4',
                            accentDark: '#0891b2',
                            textPrimary: '#f8fafc',
                            textSecondary: '#94a3b8',
                            green: '#10b981',
                            border: '#33343b'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'laser': 'laserScan 2.5s ease-in-out infinite',
                        'ekg': 'ekgDraw 3s linear infinite',
                        'glowPulse': 'glowPulse 4s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        laserScan: {
                            '0%, 100%': { transform: 'translateY(-100%)', opacity: '0' },
                            '10%, 90%': { opacity: '1' },
                            '50%': { transform: 'translateY(100%)' }
                        },
                        ekgDraw: {
                            '0%': { strokeDashoffset: '1000' },
                            '100%': { strokeDashoffset: '0' }
                        },
                        glowPulse: {
                            '0%': { opacity: '0.3', transform: 'scale(0.95) translateX(-50%)' },
                            '100%': { opacity: '0.6', transform: 'scale(1.05) translateX(-50%)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            background-color: #1a1b1e;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1b1e;
        }

        ::-webkit-scrollbar-thumb {
            background: #33343b;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4b5563;
        }

        .glass-hero {
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.4);
            position: relative;
            overflow: hidden;
        }

        .glass-hero::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 1440 320" xmlns="http://www.w3.org/2000/svg"><path fill="rgba(255,255,255,0.1)" d="M0,160L48,154.7C96,149,192,139,288,149.3C384,160,480,192,576,202.7C672,213,768,203,864,176C960,149,1056,107,1152,101.3C1248,96,1344,128,1392,144L1440,160L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') no-repeat bottom center;
            background-size: cover;
            opacity: 0.6;
            pointer-events: none;
        }

        .stagger-1 {
            animation: slideUpFade 0.5s ease-out 0.1s both;
        }

        .stagger-2 {
            animation: slideUpFade 0.5s ease-out 0.2s both;
        }

        .stagger-3 {
            animation: slideUpFade 0.5s ease-out 0.3s both;
        }

        .stagger-4 {
            animation: slideUpFade 0.5s ease-out 0.4s both;
        }

        @keyframes slideUpFade {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .skeleton {
            background: linear-gradient(90deg, #2a2b32 25%, #33343b 50%, #2a2b32 75%);
            background-size: 200% 100%;
            animation: skeletonLoading 1.5s infinite;
        }

        @keyframes skeletonLoading {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        .grid-pattern {
            background-image:
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const CLASS_META = {
            'mel': { name: 'Melanoma', classification: 'Cancer', classTag: 'text-red-400 border-red-400/50 bg-red-400/10', severity: 'High', color: 'text-red-400', statColor: 'bg-red-400', desc: 'A dangerous type of skin cancer that can spread rapidly. Immediate clinical consultation required.' },
            'nv': { name: 'Melanocytic Nevus', classification: 'Non-Cancer', classTag: 'text-dashboard-green border-dashboard-green/50 bg-dashboard-green/10', severity: 'Low', color: 'text-dashboard-green', statColor: 'bg-dashboard-green', desc: 'A common, harmless mole. Usually no treatment is necessary.' },
            'bcc': { name: 'Basal Cell Carcinoma', classification: 'Cancer', classTag: 'text-red-400 border-red-400/50 bg-red-400/10', severity: 'Medium', color: 'text-amber-400', statColor: 'bg-amber-400', desc: 'A common, slow-growing skin cancer. Rarely spreads, but should be treated.' },
            'akiec': { name: 'Actinic Keratosis', classification: 'Cancer', classTag: 'text-red-400 border-red-400/50 bg-red-400/10', severity: 'Medium', color: 'text-amber-400', statColor: 'bg-amber-400', desc: 'A precancerous scaly patch caused by sun damage. Can progress to cancer.' },
            'bkl': { name: 'Benign Keratosis', classification: 'Non-Cancer', classTag: 'text-dashboard-green border-dashboard-green/50 bg-dashboard-green/10', severity: 'Low', color: 'text-dashboard-green', statColor: 'bg-dashboard-green', desc: 'A harmless, non-cancerous skin growth prevalent with aging.' },
            'df': { name: 'Dermatofibroma', classification: 'Non-Cancer', classTag: 'text-dashboard-green border-dashboard-green/50 bg-dashboard-green/10', severity: 'Low', color: 'text-dashboard-green', statColor: 'bg-dashboard-green', desc: 'A common benign fibrous nodule often found on lower legs.' },
            'vasc': { name: 'Vascular Lesion', classification: 'Non-Cancer', classTag: 'text-dashboard-green border-dashboard-green/50 bg-dashboard-green/10', severity: 'Low', color: 'text-dashboard-green', statColor: 'bg-dashboard-green', desc: 'A harmless overgrowth of blood vessels (e.g., hemangioma).' },
        };

        const STATUS = { IDLE: 'IDLE', ANALYZING: 'ANALYZING', SUCCESS: 'SUCCESS', ERROR: 'ERROR' };

        function CircularProgress({ percent, bg, className }) {
            const radius = 45;
            const circumference = 2 * Math.PI * radius;
            const dashArray = `${circumference * 0.5} ${circumference * 0.5}`;
            const finalOffset = circumference * 0.5 - (percent / 100) * (circumference * 0.5);
            return (
                <div className={`relative ${className}`}>
                    <svg width="100%" height="100%" viewBox="0 0 100 100" style={{ transform: 'rotate(180deg)' }}>
                        <path d="M 10,50 a 40,40 0 1,1 80,0" fill="none" stroke="#33343b" strokeWidth="10" strokeLinecap="round" />
                        <path
                            d="M 10,50 a 40,40 0 1,1 80,0"
                            fill="none" stroke={bg || "#06b6d4"} strokeWidth="10" strokeLinecap="round"
                            strokeDasharray={`${circumference} ${circumference}`}
                            strokeDashoffset={finalOffset}
                            style={{ transition: 'stroke-dashoffset 1.5s cubic-bezier(0.22, 1, 0.36, 1)' }}
                        />
                    </svg>
                </div>
            );
        }

        function EKGSpline() {
            return (
                <svg className="w-full h-16 opacity-20" viewBox="0 0 500 100" preserveAspectRatio="none">
                    <polyline
                        fill="none" stroke="#06b6d4" strokeWidth="3"
                        strokeLinecap="round" strokeLinejoin="round"
                        strokeDasharray="1000" className="animate-ekg"
                        points="0,50 50,50 70,20 90,80 110,10 130,90 150,50 500,50"
                    />
                </svg>
            );
        }

        function App() {
            const [file, setFile] = React.useState(null);
            const [previewUrl, setPreviewUrl] = React.useState(null);
            const [status, setStatus] = React.useState(STATUS.IDLE);
            const [errorMsg, setErrorMsg] = React.useState('');
            const [result, setResult] = React.useState(null);
            const [currentTime, setCurrentTime] = React.useState(
                new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            );
            const [copied, setCopied] = React.useState(false);

            React.useEffect(() => {
                const timer = setInterval(() =>
                    setCurrentTime(new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })),
                    60000);
                return () => clearInterval(timer);
            }, []);

            const handleFileChange = (e) => {
                const selectedFile = e.target.files[0];
                if (selectedFile) processSelection(selectedFile);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                if (e.dataTransfer.files && e.dataTransfer.files.length > 0)
                    processSelection(e.dataTransfer.files[0]);
            };

            const processSelection = (selectedFile) => {
                if (selectedFile.type.startsWith('image/')) {
                    setFile(selectedFile);
                    setPreviewUrl(URL.createObjectURL(selectedFile));
                    setStatus(STATUS.IDLE);
                    setResult(null);
                    setErrorMsg('');
                } else {
                    setErrorMsg('Invalid format. Please use JPEG or PNG.');
                }
            };

            const analyzeImage = async () => {
                if (!file) return;
                setStatus(STATUS.ANALYZING);
                setErrorMsg('');
                const formData = new FormData();
                formData.append('file', file);
                try {
                    const analyzeStart = Date.now();
                    const response = await fetch('/predict', { method: 'POST', body: formData });
                    if (!response.ok) throw new Error(`API Error: ${response.status}`);
                    const data = await response.json();
                    const elapsed = Date.now() - analyzeStart;
                    if (elapsed < 1500) await new Promise(r => setTimeout(r, 1500 - elapsed));
                    setResult(data);
                    setStatus(STATUS.SUCCESS);
                } catch (err) {
                    console.error('API Error:', err);
                    setErrorMsg('Network error or invalid image.');
                    setStatus(STATUS.ERROR);
                }
            };

            const resetDashboard = () => {
                setFile(null);
                setPreviewUrl(null);
                setStatus(STATUS.IDLE);
                setResult(null);
                setErrorMsg('');
                setCopied(false);
            };

            const copyResult = () => {
                if (result && diagnosis) {
                    const text = `SKIN LESION ANALYSIS REPORT\n${'='.repeat(30)}\nCondition: ${diagnosis.name}\nClassification: ${diagnosis.classification}\nAI Confidence: ${confidencePercent}%\nDanger Level: ${diagnosis.severity} Risk\nNotes: ${diagnosis.desc}\nGenerated: ${new Date().toLocaleString()}`;
                    navigator.clipboard.writeText(text);
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                }
            };

            const confidencePercent = result ? Math.round(result.confidence * 100) : 0;
            const diagnosis = result ? CLASS_META[result.prediction] : null;

            // Confidence band
            const confidenceBand = confidencePercent >= 80
                ? { label: '✓ High Confidence', color: 'text-dashboard-green' }
                : confidencePercent >= 60
                    ? { label: '⚠ Moderate — consider review', color: 'text-amber-400' }
                    : { label: '✗ Low — manual review recommended', color: 'text-red-400' };

            const gaugeColor = confidencePercent >= 80 ? '#10b981' : confidencePercent >= 60 ? '#f59e0b' : '#ef4444';

            return (
                <div className="min-h-screen bg-dashboard-bg p-4 sm:p-6 lg:p-8 flex items-center justify-center relative overflow-hidden">

                    {/* Atmospheric glow */}
                    <div className="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-blue-600/15 blur-[120px] pointer-events-none"></div>
                    <div className="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-sky-600/10 blur-[120px] pointer-events-none"></div>

                    <div className="max-w-7xl w-full mx-auto flex flex-col gap-6 relative z-10">

                        {/* ── Header ── */}
                        <header className="flex items-center justify-between w-full">
                            {/* App identity bar */}
                            <div className="flex-1 max-w-md bg-dashboard-card rounded-full px-5 py-3 flex items-center text-dashboard-textSecondary border border-dashboard-border shadow-sm">
                                <i className="ph-fill ph-brain text-lg mr-3 text-dashboard-accent"></i>
                                <span className="text-sm font-medium">Skin Lesion Classifier &bull; ResNet-152 &bull; 7 Classes</span>
                            </div>

                            <div className="flex items-center gap-4">
                                {/* New Scan button */}
                                <button
                                    onClick={resetDashboard}
                                    title="New Scan"
                                    className="flex items-center gap-2 h-10 px-4 rounded-full bg-dashboard-card border border-dashboard-border text-dashboard-textSecondary hover:text-white hover:border-dashboard-accent hover:shadow-[0_0_12px_rgba(6,182,212,0.4)] transition-all text-sm font-medium"
                                >
                                    <i className="ph ph-arrow-counter-clockwise text-lg"></i>
                                    <span className="hidden sm:inline">New Scan</span>
                                </button>

                                {/* Clock */}
                                <div className="hidden sm:flex bg-dashboard-card rounded-full px-4 py-2 border border-dashboard-border items-center gap-2">
                                    <i className="ph ph-clock text-dashboard-textSecondary text-base"></i>
                                    <span className="text-sm text-dashboard-textSecondary font-medium">{currentTime}</span>
                                </div>

                                {/* Avatar */}
                                <div className="h-11 w-11 rounded-full bg-slate-700 overflow-hidden border-2 border-dashboard-border shadow-sm cursor-pointer hover:border-dashboard-accent transition-colors">
                                    <img src="https://api.dicebear.com/9.x/notionists/svg?seed=Felix&backgroundColor=24252b" alt="User" className="h-full w-full object-cover" />
                                </div>
                            </div>
                        </header>

                        {/* ── Bento Grid ── */}
                        <main className="grid grid-cols-1 md:grid-cols-12 gap-6 auto-rows-min">

                            {/* COL 1: Hero Action Card */}
                            <div className="md:col-span-12 lg:col-span-4 flex flex-col gap-6">
                                <div className="glass-hero rounded-[32px] p-8 flex flex-col min-h-[500px] text-white">
                                    <div className="z-10 relative flex-1 flex flex-col">
                                        <h3 className="text-white/80 font-medium mb-1">AI Skin Analysis</h3>
                                        <h1 className="text-4xl font-semibold mb-8 tracking-tight text-balance">
                                            Upload a lesion image to begin
                                        </h1>

                                        {!previewUrl ? (
                                            <div
                                                className="flex-1 bg-black/10 backdrop-blur-md border border-white/20 rounded-2xl flex flex-col items-center justify-center text-center p-6 cursor-pointer hover:bg-black/20 hover:border-white/40 transition-all border-dashed group"
                                                onDragOver={(e) => e.preventDefault()}
                                                onDrop={handleDrop}
                                                onClick={() => document.getElementById('file-upload').click()}
                                            >
                                                <i className="ph ph-scan text-4xl mb-3 opacity-90 group-hover:scale-110 transition-transform"></i>
                                                <p className="font-medium">Upload Lesion Image</p>
                                                <p className="text-white/60 text-sm mt-1">Drag &amp; Drop or Click to Browse</p>
                                                <input id="file-upload" type="file" accept="image/*" className="hidden" onChange={handleFileChange} />
                                            </div>
                                        ) : (
                                            <div className="flex-1 flex flex-col gap-4">
                                                {/* Image Preview */}
                                                <div className="w-full h-56 bg-black/30 backdrop-blur-md border border-white/20 rounded-2xl overflow-hidden relative shadow-inner group">
                                                    <img
                                                        src={previewUrl}
                                                        className={`w-full h-full object-cover transition-transform duration-700 ease-out group-hover:scale-110 ${status === STATUS.ANALYZING ? 'opacity-50 grayscale scale-105' : ''}`}
                                                    />
                                                    {/* Laser sweep during analysis */}
                                                    {status === STATUS.ANALYZING && (
                                                        <div className="absolute inset-0 z-10 overflow-hidden pointer-events-none">
                                                            <div className="w-full h-0.5 shadow-[0_0_15px_3px_#10b981] bg-dashboard-green animate-laser"></div>
                                                            <div className="absolute inset-0 bg-dashboard-green/10 animate-pulse"></div>
                                                        </div>
                                                    )}
                                                </div>

                                                {status === STATUS.IDLE && (
                                                    <button onClick={analyzeImage} className="w-full bg-white text-dashboard-accent font-semibold py-4 rounded-xl flex items-center justify-center shadow-lg hover:shadow-[0_0_20px_rgba(255,255,255,0.4)] hover:scale-[1.02] transition-all">
                                                        <i className="ph-fill ph-stethoscope mr-2 text-xl"></i>
                                                        Analyze Image
                                                    </button>
                                                )}

                                                {status === STATUS.ANALYZING && (
                                                    <div className="w-full bg-white/10 backdrop-blur-md text-white font-medium py-4 rounded-xl flex items-center justify-center border border-white/20 shadow-[inset_0_0_20px_rgba(255,255,255,0.1)]">
                                                        <i className="ph ph-spinner-gap animate-spin mr-3 text-2xl"></i>
                                                        Analyzing...
                                                    </div>
                                                )}

                                                {status === STATUS.SUCCESS && (
                                                    <button onClick={resetDashboard} className="w-full bg-black/30 backdrop-blur-md text-white font-medium py-3 rounded-xl flex items-center justify-center border border-white/30 hover:bg-black/50 transition-colors">
                                                        <i className="ph ph-arrow-counter-clockwise mr-2 text-xl"></i>
                                                        New Scan
                                                    </button>
                                                )}

                                                {status === STATUS.ERROR && (
                                                    <div className="w-full bg-red-900/50 backdrop-blur-md text-white font-medium py-3 rounded-xl flex flex-col items-center justify-center border border-red-500/50">
                                                        <span className="flex items-center"><i className="ph ph-warning-circle mr-2 text-xl"></i> Error Occurred</span>
                                                        <span className="text-xs mt-1 opacity-80">{errorMsg}</span>
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        {/* Bottom toolbar — useful actions */}
                                        <div className="bg-white/95 text-dashboard-bg rounded-2xl p-3 flex justify-between items-center mt-6 shadow-xl z-20">
                                            {/* Re-upload */}
                                            <button
                                                onClick={() => document.getElementById('file-upload').click()}
                                                title="Upload a different image"
                                                className="h-10 w-10 flex items-center justify-center hover:bg-dashboard-accent hover:text-white rounded-xl transition-colors"
                                            >
                                                <i className="ph ph-upload-simple text-xl"></i>
                                            </button>

                                            {/* File name */}
                                            <div className="text-xs text-center text-dashboard-bg/60 font-medium px-2 truncate max-w-[120px]" title={file ? file.name : ''}>
                                                {file ? file.name : 'No file selected'}
                                            </div>

                                            {/* Copy result */}
                                            <button
                                                onClick={copyResult}
                                                title="Copy result to clipboard"
                                                className={`h-10 w-10 flex items-center justify-center rounded-xl transition-colors ${copied ? 'bg-dashboard-green text-white' : 'hover:bg-dashboard-accent hover:text-white'}`}
                                            >
                                                <i className={`ph ${copied ? 'ph-check' : 'ph-copy'} text-xl`}></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* COL 2: Verdict + Confidence */}
                            <div className="md:col-span-6 lg:col-span-4 flex flex-col gap-6">

                                {/* ── Verdict Card (replaces Session Status) ── */}
                                <div className="bg-dashboard-card rounded-[28px] p-6 border border-dashboard-border shadow-md transition-all duration-300 hover:-translate-y-2 hover:shadow-[0_15px_30px_-10px_rgba(6,182,212,0.3)] hover:border-dashboard-accent/30 group">
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="text-lg font-medium transition-colors group-hover:text-dashboard-accent">Analysis Status</h3>
                                        <i className="ph ph-activity text-dashboard-textSecondary text-xl"></i>
                                    </div>

                                    {/* Big verdict badge */}
                                    {status === STATUS.SUCCESS && diagnosis ? (
                                        <div className={`rounded-2xl p-5 flex flex-col items-center justify-center gap-2 text-center stagger-1 ${diagnosis.classification === 'Cancer' ? 'bg-red-500/10 border border-red-500/40' : 'bg-dashboard-green/10 border border-dashboard-green/40'}`}>
                                            <i className={`text-5xl ${diagnosis.classification === 'Cancer' ? 'ph-fill ph-warning-circle text-red-400' : 'ph-fill ph-check-circle text-dashboard-green'}`}></i>
                                            <p className={`text-2xl font-bold tracking-wide ${diagnosis.classification === 'Cancer' ? 'text-red-400' : 'text-dashboard-green'}`}>
                                                {diagnosis.classification === 'Cancer' ? 'CANCER DETECTED' : 'NON-CANCEROUS'}
                                            </p>
                                            <p className="text-sm text-dashboard-textSecondary">{diagnosis.name} ({result.prediction}) &bull; AI is {confidencePercent}% sure</p>
                                        </div>
                                    ) : status === STATUS.ANALYZING ? (
                                        <div className="rounded-2xl p-5 flex flex-col items-center justify-center gap-2 border border-dashboard-accent/30 bg-dashboard-accent/5">
                                            <i className="ph ph-spinner-gap animate-spin text-4xl text-dashboard-accent"></i>
                                            <p className="text-sm text-dashboard-textSecondary font-medium">Running AI analysis...</p>
                                        </div>
                                    ) : (
                                        <div className="rounded-2xl p-5 flex flex-col items-center justify-center gap-3 border-2 border-dashed border-dashboard-border">
                                            <i className="ph ph-scan text-4xl text-dashboard-textSecondary"></i>
                                            <div className="text-center">
                                                <p className="text-sm font-medium text-dashboard-textSecondary">No result yet</p>
                                                <p className="text-xs text-dashboard-textSecondary/60 mt-0.5">Upload an image to begin</p>
                                            </div>
                                        </div>
                                    )}

                                    <div className="mt-5 flex justify-between px-1 text-sm">
                                        <div>
                                            <p className="font-semibold text-dashboard-textPrimary">
                                                {status === STATUS.SUCCESS ? 'Complete' : status === STATUS.ANALYZING ? 'In Progress' : 'Ready'}
                                            </p>
                                            <p className="text-xs text-dashboard-textSecondary mt-0.5">Status</p>
                                        </div>
                                        <div>
                                            <p className="font-semibold tracking-wider text-dashboard-textPrimary">ResNet-152</p>
                                            <p className="text-xs text-dashboard-textSecondary mt-0.5 text-right">AI Model</p>
                                        </div>
                                    </div>
                                </div>

                                {/* ── AI Confidence Gauge ── */}
                                <div className="bg-dashboard-card rounded-[28px] p-6 border border-dashboard-border shadow-md transition-all duration-300 hover:-translate-y-2 hover:shadow-[0_15px_30px_-10px_rgba(6,182,212,0.3)] hover:border-dashboard-accent/50 group flex-1 flex flex-col relative overflow-hidden">
                                    <div className={`absolute bottom-[-50px] left-1/2 -translate-x-1/2 w-72 h-48 rounded-full blur-[60px] pointer-events-none transition-all duration-1000 ${status === STATUS.SUCCESS ? 'bg-dashboard-accent/30 animate-glowPulse' : 'bg-blue-500/5'}`}></div>

                                    <h3 className="text-lg font-medium mb-2 transition-colors group-hover:text-dashboard-accent relative z-10">AI Confidence</h3>
                                    <p className="text-xs text-dashboard-textSecondary mb-6 relative z-10">How sure the AI is in its prediction</p>

                                    <div className="relative flex-1 flex flex-col items-center justify-end pb-4 pt-8">
                                        <CircularProgress
                                            percent={confidencePercent}
                                            bg={gaugeColor}
                                            className="w-56 h-28 absolute bottom-4 z-10"
                                        />

                                        <div className="text-center z-20 relative mt-4">
                                            <i className="ph-fill ph-target text-3xl mb-1 text-dashboard-textPrimary"></i>
                                            <h2 className="text-5xl font-bold tracking-tight mb-1 text-white">
                                                {status === STATUS.SUCCESS ? confidencePercent : '- -'}
                                                <span className="text-2xl text-dashboard-textSecondary font-normal">%</span>
                                            </h2>
                                            <p className={`text-sm font-semibold ${status === STATUS.SUCCESS ? confidenceBand.color : 'text-dashboard-textSecondary'}`}>
                                                {status === STATUS.ANALYZING
                                                    ? 'Calculating...'
                                                    : status === STATUS.SUCCESS
                                                        ? confidenceBand.label
                                                        : 'How sure the AI is'}
                                            </p>
                                        </div>
                                    </div>
                                </div>

                            </div>

                            {/* COL 3: Detailed Results & What This Means */}
                            <div className="md:col-span-6 lg:col-span-4 flex flex-col gap-6 relative">

                                {/* ── Detailed Results Card ── */}
                                <div className="bg-dashboard-card rounded-[28px] p-6 border border-dashboard-border shadow-md transition-all duration-300 hover:-translate-y-2 hover:shadow-[0_15px_30px_-10px_rgba(6,182,212,0.3)] hover:border-dashboard-accent/50 group relative overflow-hidden">
                                    <div className="relative z-10">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="text-lg font-medium transition-colors group-hover:text-dashboard-accent">Detailed Results</h3>
                                            {/* Export button — actually exports */}
                                            <button
                                                title="Export report as text file"
                                                onClick={() => {
                                                    if (result && diagnosis) {
                                                        const text = `SKIN LESION ANALYSIS REPORT\n${'='.repeat(30)}\nCondition: ${diagnosis.name}\nClassification: ${diagnosis.classification}\nAI Confidence: ${confidencePercent}%\nDanger Level: ${diagnosis.severity} Risk\nNotes: ${diagnosis.desc}\nGenerated: ${new Date().toLocaleString()}`;
                                                        const blob = new Blob([text], { type: 'text/plain' });
                                                        const a = document.createElement('a');
                                                        a.href = URL.createObjectURL(blob);
                                                        a.download = 'lesion-report.txt';
                                                        a.click();
                                                    }
                                                }}
                                                className="p-1.5 bg-dashboard-bg rounded-lg text-dashboard-textSecondary hover:text-white border border-dashboard-border transition-colors hover:border-dashboard-accent"
                                            >
                                                <i className="ph ph-export text-lg"></i>
                                            </button>
                                        </div>

                                        {status === STATUS.SUCCESS && diagnosis ? (
                                            <div className="space-y-4">
                                                {/* Detected condition */}
                                                <div className="bg-dashboard-bg border border-dashboard-border rounded-2xl p-4 flex items-center justify-between shadow-inner stagger-1">
                                                    <div className="flex items-center gap-3">
                                                        <div className={`w-10 h-10 rounded-xl ${diagnosis.statColor} bg-opacity-20 flex items-center justify-center shadow-inner`}>
                                                            <i className={`ph-fill ph-dna ${diagnosis.color} text-xl`}></i>
                                                        </div>
                                                        <div>
                                                            <p className="text-xs text-dashboard-textSecondary mb-0.5 uppercase tracking-wider font-semibold">Detected Condition</p>
                                                            <p className="font-semibold text-white">{diagnosis.name}</p>
                                                        </div>
                                                    </div>
                                                    <span className={`text-sm font-bold bg-dashboard-card px-3 py-1 rounded-full border border-dashboard-border ${diagnosis.color}`}>{confidencePercent}%</span>
                                                </div>

                                                {/* Danger level */}
                                                <div className="flex justify-between items-center px-4 py-3 border border-dashboard-border bg-dashboard-bg/50 rounded-xl stagger-2">
                                                    <div className="flex items-center gap-2 text-sm text-dashboard-textSecondary">
                                                        <i className="ph ph-warning-octagon text-lg"></i>
                                                        <span>Danger Level</span>
                                                    </div>
                                                    <span className={`font-semibold text-sm ${diagnosis.color}`}>{diagnosis.severity} Risk</span>
                                                </div>

                                                {/* Category */}
                                                <div className="flex justify-between items-center px-4 py-3 border border-dashboard-border bg-dashboard-bg/50 rounded-xl stagger-3">
                                                    <div className="flex items-center gap-2 text-sm text-dashboard-textSecondary">
                                                        <i className="ph ph-tag text-lg"></i>
                                                        <span>Category</span>
                                                    </div>
                                                    <span className={`font-semibold text-xs px-3 py-1.5 border rounded-lg uppercase tracking-widest ${diagnosis.classTag}`}>
                                                        {diagnosis.classification}
                                                    </span>
                                                </div>
                                            </div>
                                        ) : status === STATUS.ANALYZING ? (
                                            <div className="space-y-4">
                                                <div className="skeleton h-16 w-full rounded-2xl"></div>
                                                <div className="skeleton h-12 w-full rounded-xl"></div>
                                                <div className="skeleton h-12 w-full rounded-xl"></div>
                                            </div>
                                        ) : (
                                            <div className="h-44 border-2 border-dashed border-dashboard-border rounded-xl flex items-center justify-center text-dashboard-textSecondary text-sm relative overflow-hidden group-hover:border-dashboard-accent/30 transition-colors">
                                                <div className="absolute inset-0 grid-pattern opacity-50"></div>
                                                <div className="relative z-10 flex flex-col items-center">
                                                    <EKGSpline />
                                                    <p className="mt-2 text-xs uppercase tracking-widest opacity-60">Upload an image to see results</p>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* ── What This Means Card ── */}
                                <div className="bg-dashboard-card rounded-[28px] p-6 border border-dashboard-border shadow-md transition-all duration-300 hover:-translate-y-2 hover:shadow-[0_15px_30px_-10px_rgba(6,182,212,0.3)] hover:border-dashboard-accent/50 group flex-1 flex flex-col overflow-hidden relative">
                                    <h3 className="text-lg font-medium mb-6 transition-colors group-hover:text-dashboard-accent relative z-10">What This Means</h3>

                                    {status === STATUS.SUCCESS && <div className="absolute inset-0 grid-pattern opacity-20 pointer-events-none"></div>}

                                    <div className="flex-1 flex flex-col justify-center gap-6 relative z-10">
                                        {status === STATUS.SUCCESS && diagnosis ? (
                                            <div className="stagger-4">
                                                <h4 className="text-3xl font-bold tracking-tight mb-3 text-white text-balance">
                                                    {diagnosis.name}
                                                </h4>
                                                <p className="text-dashboard-textSecondary text-sm leading-relaxed mb-6 font-medium">
                                                    {diagnosis.desc}
                                                </p>
                                                <button className={`w-full border font-medium py-3.5 rounded-xl transition-all flex items-center justify-center text-sm shadow-sm ${diagnosis.severity === 'High' ? 'bg-dashboard-accent/10 border-dashboard-accent text-dashboard-accent hover:bg-dashboard-accent hover:text-white' : 'bg-dashboard-bg border-dashboard-border text-white hover:border-dashboard-green hover:text-dashboard-green'}`}>
                                                    {diagnosis.severity === 'High' ? (
                                                        <><i className="ph-fill ph-warning mr-2 text-lg"></i> Priority Medical Review</>
                                                    ) : (
                                                        <><i className="ph ph-floppy-disk mr-2 text-lg"></i> Save Record</>
                                                    )}
                                                </button>
                                            </div>
                                        ) : status === STATUS.ANALYZING ? (
                                            <div className="space-y-3">
                                                <div className="skeleton h-8 w-3/4 rounded-lg"></div>
                                                <div className="skeleton h-4 w-full rounded-md mt-4"></div>
                                                <div className="skeleton h-4 w-5/6 rounded-md"></div>
                                                <div className="skeleton h-12 w-full rounded-xl mt-6"></div>
                                            </div>
                                        ) : (
                                            <div className="text-center">
                                                <div className="w-16 h-16 rounded-2xl bg-dashboard-bg border border-dashboard-border flex items-center justify-center mx-auto mb-4 scale-100 group-hover:scale-110 transition-transform">
                                                    <i className="ph ph-info text-2xl text-dashboard-textSecondary"></i>
                                                </div>
                                                <p className="text-dashboard-textSecondary text-sm text-balance max-w-xs mx-auto">
                                                    A plain-language explanation of the condition and recommended next steps will appear here after analysis.
                                                </p>
                                            </div>
                                        )}
                                    </div>
                                </div>

                            </div>
                        </main>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
